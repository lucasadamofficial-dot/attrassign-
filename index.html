<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AttrAssign — Attribute Manager</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>body{margin:0}</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

/* =====================================================================
   1) CONFIG — paste your deployed Apps Script Web app URL here
   ===================================================================== */
const API = "https://script.google.com/macros/s/AKfycbyUJiFF2DboilOqT7LYZvHxohIdHoveGfEjPu6N5EVNVCSRaV8k2CTdxMW5nxhmxok/exec";

async function api(action, payload = {}) {
  // POST with no custom headers -> text/plain -> no CORS preflight
  const res = await fetch(API, { method: "POST", body: JSON.stringify({ action, ...payload }) });
  return res.json();
}
async function loadData() {
  const r = await api("load");
  if (r && r.ok && r.data) return r.data;
  const seeded = seedData();
  try { await api("save", { data: seeded }); } catch (e) {}
  return seeded;
}

/* ----------------------------- icons ----------------------------- */
const ICONS = {
  boxes:'<path d="M3 7l9-4 9 4v10l-9 4-9-4z"/><path d="M3 7l9 4 9-4"/><path d="M12 11v10"/>',
  tags:'<path d="M3 3h8l10 10-8 8L3 11z"/><circle cx="7" cy="7" r="1.3"/>',
  listChecks:'<path d="M10 6h11"/><path d="M10 12h11"/><path d="M10 18h11"/><path d="M3 6l1.5 1.5L7 4"/><path d="M3 12l1.5 1.5L7 10"/>',
  search:'<circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/>',
  plus:'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  pencil:'<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>',
  trash2:'<path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 14h10l1-14"/><line x1="10" y1="10" x2="10" y2="17"/><line x1="14" y1="10" x2="14" y2="17"/>',
  eye:'<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>',
  x:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  check:'<path d="M20 6L9 17l-5-5"/>',
  shield:'<path d="M12 3l8 3v6c0 5-4 8-8 9-4-1-8-4-8-9V6z"/>',
  briefcase:'<rect x="3" y="8" width="18" height="12" rx="1"/><path d="M8 8V6h8v2"/>',
  save:'<path d="M19 21H5V3h11l3 3z"/><path d="M8 3v6h7"/><path d="M8 13h8v8"/>',
  folderTree:'<path d="M3 4h6l2 2h9v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>',
  packagePlus:'<path d="M21 11V8l-9-4-9 4v8l9 4"/><path d="M3 8l9 4 9-4"/><path d="M16 16h6"/><path d="M19 13v6"/>',
  upload:'<path d="M12 16V4"/><path d="M7 9l5-5 5 5"/><path d="M5 20h14"/>',
  alertTriangle:'<path d="M12 3l10 18H2z"/><line x1="12" y1="9" x2="12" y2="14"/><circle cx="12" cy="17.5" r="0.6" fill="currentColor"/>',
  layers:'<path d="M12 3l9 5-9 5-9-5z"/><path d="M3 13l9 5 9-5"/>',
  lock:'<rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/>',
};
function Icon({ name, size = 16, className = "" }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
    strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}
    dangerouslySetInnerHTML={{ __html: ICONS[name] || "" }} />;
}
const mk = (n) => (p) => <Icon name={n} {...p} />;
const Boxes=mk("boxes"), Tags=mk("tags"), ListChecks=mk("listChecks"), Search=mk("search"),
  Plus=mk("plus"), Pencil=mk("pencil"), Trash2=mk("trash2"), Eye=mk("eye"), X=mk("x"),
  Check=mk("check"), Shield=mk("shield"), Briefcase=mk("briefcase"), Save=mk("save"),
  FolderTree=mk("folderTree"), PackagePlus=mk("packagePlus"), Upload=mk("upload"),
  AlertTriangle=mk("alertTriangle"), Layers=mk("layers"), Lock=mk("lock");

/* --------------------------- permissions --------------------------- */
const PERMS = {
  admin: ["view","edit","assign","delete","addProduct","manageCategories","manageAttributes","bulkAdd"],
  sales: ["view","edit","assign"],
};
const can = (role, action) => !!PERMS[role]?.includes(action);

/* ------------------------------ helpers ---------------------------- */
const uid = (p = "id") => `${p}_${Math.random().toString(36).slice(2, 9)}`;

function seedData() {
  const c1 = uid("cat"), c2 = uid("cat"), c3 = uid("cat"), c4 = uid("cat");
  const categories = [
    { id: c1, name: "Mylar Bags", subs: [
      { id: uid("sub"), name: "Stand-up Pouches" },
      { id: uid("sub"), name: "Flat Pouches" },
      { id: uid("sub"), name: "Child-Resistant" }] },
    { id: c2, name: "Custom Boxes", subs: [
      { id: uid("sub"), name: "Cosmetic Boxes" },
      { id: uid("sub"), name: "Tuck Boxes" },
      { id: uid("sub"), name: "CBD Boxes" }] },
    { id: c3, name: "Labels", subs: [
      { id: uid("sub"), name: "Roll Labels" },
      { id: uid("sub"), name: "Sheet Labels" }] },
    { id: c4, name: "Food Packaging", subs: [
      { id: uid("sub"), name: "EZ Peel Pouches" },
      { id: uid("sub"), name: "Blister Packs" }] },
  ];
  const attributes = [
    { id: uid("at"), name: "Material", type: "single", options: ["Mylar","Kraft","Cardstock","Corrugated"] },
    { id: uid("at"), name: "Finish", type: "single", options: ["Matte","Gloss","Soft-touch","Spot UV"] },
    { id: uid("at"), name: "MOQ", type: "single", options: ["500","1000","2500","5000"] },
    { id: uid("at"), name: "Size", type: "multiple", options: ["Small","Medium","Large","Custom"] },
    { id: uid("at"), name: "Add-ons", type: "multiple", options: ["Window","Zipper","Hang Hole","Tear Notch"] },
  ];
  const [mat, fin, moq, size, addon] = attributes;
  const products = [
    { id: uid("p"), name: "Custom Mylar Stand-up Pouch", sku: "MYL-SUP-001",
      categoryId: c1, subId: categories[0].subs[0].id,
      values: { [mat.id]:"Mylar", [fin.id]:"Matte", [moq.id]:"1000", [size.id]:["Medium","Large"], [addon.id]:["Zipper","Tear Notch"] } },
    { id: uid("p"), name: "CBD Oil Box", sku: "BOX-CBD-014",
      categoryId: c2, subId: categories[1].subs[2].id,
      values: { [mat.id]:"Cardstock", [fin.id]:"Soft-touch", [moq.id]:"500", [size.id]:["Small"], [addon.id]:[] } },
    { id: uid("p"), name: "Cosmetic Tuck Box", sku: "BOX-COS-007",
      categoryId: c2, subId: categories[1].subs[0].id,
      values: { [mat.id]:"Cardstock", [fin.id]:"Spot UV", [moq.id]:"2500", [size.id]:["Custom"], [addon.id]:["Window"] } },
  ];
  return { categories, attributes, products };
}

/* ------------------------------ UI atoms --------------------------- */
const btn = "inline-flex items-center gap-1.5 rounded-md text-sm font-medium transition-colors disabled:opacity-40 disabled:cursor-not-allowed";
const btnPrimary = `${btn} bg-indigo-600 text-white px-3 py-1.5 hover:bg-indigo-700`;
const btnGhost = `${btn} text-slate-600 px-2.5 py-1.5 hover:bg-slate-100`;
const btnDanger = `${btn} text-rose-600 px-2.5 py-1.5 hover:bg-rose-50`;
const input = "w-full rounded-md border border-slate-300 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500";

function Badge({ children, tone = "slate" }) {
  const tones = { slate:"bg-slate-100 text-slate-600", indigo:"bg-indigo-50 text-indigo-700",
    amber:"bg-amber-50 text-amber-700", green:"bg-emerald-50 text-emerald-700" };
  return <span className={`inline-flex items-center rounded px-1.5 py-0.5 text-[11px] font-medium ${tones[tone]}`}>{children}</span>;
}

function Modal({ title, onClose, children, wide }) {
  return (
    <div className="fixed inset-0 z-50 flex items-start justify-center bg-slate-900/40 p-4 overflow-y-auto" onMouseDown={onClose}>
      <div className={`mt-10 w-full ${wide ? "max-w-3xl" : "max-w-lg"} rounded-xl bg-white shadow-xl`} onMouseDown={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between border-b border-slate-200 px-5 py-3">
          <h3 className="text-sm font-semibold text-slate-800">{title}</h3>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-700"><X size={18} /></button>
        </div>
        <div className="px-5 py-4">{children}</div>
      </div>
    </div>
  );
}

function Confirm({ text, onCancel, onConfirm }) {
  return (
    <Modal title="Confirm" onClose={onCancel}>
      <div className="flex gap-3">
        <AlertTriangle className="text-amber-500 shrink-0" size={20} />
        <p className="text-sm text-slate-600">{text}</p>
      </div>
      <div className="mt-5 flex justify-end gap-2">
        <button className={btnGhost} onClick={onCancel}>Cancel</button>
        <button className={`${btn} bg-rose-600 text-white px-3 py-1.5 hover:bg-rose-700`} onClick={onConfirm}>Delete</button>
      </div>
    </Modal>
  );
}

/* --------------------------- product editor ------------------------ */
function ProductEditor({ mode, product, data, onClose, onSave }) {
  const readOnly = mode === "view";
  const [name, setName] = useState(product?.name || "");
  const [sku, setSku] = useState(product?.sku || "");
  const [categoryId, setCategoryId] = useState(product?.categoryId || "");
  const [subId, setSubId] = useState(product?.subId || "");
  const [values, setValues] = useState(product?.values || {});

  const cat = data.categories.find((c) => c.id === categoryId);
  const subs = cat?.subs || [];

  const setSingle = (attrId, val) => setValues((v) => ({ ...v, [attrId]: v[attrId] === val ? "" : val }));
  const toggleMulti = (attrId, val) => setValues((v) => {
    const cur = Array.isArray(v[attrId]) ? v[attrId] : [];
    return { ...v, [attrId]: cur.includes(val) ? cur.filter((x) => x !== val) : [...cur, val] };
  });

  const titleMap = { add: "Add product", edit: "Edit product & assign attributes", view: "Product details" };

  const save = () => {
    if (!name.trim()) return alert("Product name is required.");
    if (!categoryId) return alert("Pick a category.");
    onSave({ id: product?.id || uid("p"), name: name.trim(), sku: sku.trim(), categoryId, subId, values });
  };

  return (
    <Modal title={titleMap[mode]} onClose={onClose} wide>
      <div className="grid grid-cols-2 gap-3">
        <div className="col-span-2 sm:col-span-1">
          <label className="mb-1 block text-xs font-medium text-slate-500">Product name</label>
          {readOnly ? <p className="text-sm font-medium text-slate-800">{name}</p>
            : <input className={input} value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. Custom Mylar Pouch" />}
        </div>
        <div className="col-span-2 sm:col-span-1">
          <label className="mb-1 block text-xs font-medium text-slate-500">SKU</label>
          {readOnly ? <p className="text-sm text-slate-600">{sku || "—"}</p>
            : <input className={input} value={sku} onChange={(e) => setSku(e.target.value)} placeholder="optional" />}
        </div>
        <div className="col-span-2 sm:col-span-1">
          <label className="mb-1 block text-xs font-medium text-slate-500">Category</label>
          {readOnly ? <p className="text-sm text-slate-700">{cat?.name || "—"}</p>
            : <select className={input} value={categoryId} onChange={(e) => { setCategoryId(e.target.value); setSubId(""); }}>
                <option value="">Select category…</option>
                {data.categories.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>}
        </div>
        <div className="col-span-2 sm:col-span-1">
          <label className="mb-1 block text-xs font-medium text-slate-500">Sub-category</label>
          {readOnly ? <p className="text-sm text-slate-700">{subs.find((s) => s.id === subId)?.name || "—"}</p>
            : <select className={input} value={subId} onChange={(e) => setSubId(e.target.value)} disabled={!subs.length}>
                <option value="">{subs.length ? "Select sub-category…" : "None"}</option>
                {subs.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
              </select>}
        </div>
      </div>

      <div className="mt-5 border-t border-slate-200 pt-4">
        <div className="mb-3 flex items-center gap-2">
          <ListChecks size={15} className="text-indigo-600" />
          <h4 className="text-xs font-semibold uppercase tracking-wide text-slate-500">Attributes</h4>
        </div>
        <div className="space-y-3">
          {data.attributes.map((a) => {
            const val = values[a.id];
            return (
              <div key={a.id} className="rounded-lg border border-slate-200 p-3">
                <div className="mb-2 flex items-center gap-2">
                  <span className="text-sm font-medium text-slate-700">{a.name}</span>
                  <Badge tone={a.type === "single" ? "indigo" : "amber"}>{a.type}</Badge>
                </div>
                <div className="flex flex-wrap gap-1.5">
                  {a.options.map((opt) => {
                    const active = a.type === "single" ? val === opt : Array.isArray(val) && val.includes(opt);
                    if (readOnly && !active) return null;
                    return (
                      <button key={opt} disabled={readOnly}
                        onClick={() => a.type === "single" ? setSingle(a.id, opt) : toggleMulti(a.id, opt)}
                        className={`rounded-full border px-2.5 py-1 text-xs transition-colors ${
                          active ? "border-indigo-600 bg-indigo-600 text-white" : "border-slate-300 text-slate-600 hover:border-indigo-400"
                        } ${readOnly ? "cursor-default" : ""}`}>
                        {active && <Check size={11} className="mr-1 inline" />}{opt}
                      </button>
                    );
                  })}
                  {readOnly && !(a.type === "single" ? val : (val || []).length) && (
                    <span className="text-xs text-slate-400">Not assigned</span>
                  )}
                </div>
              </div>
            );
          })}
          {!data.attributes.length && <p className="text-sm text-slate-400">No attributes defined yet.</p>}
        </div>
      </div>

      {!readOnly && (
        <div className="mt-5 flex justify-end gap-2">
          <button className={btnGhost} onClick={onClose}>Cancel</button>
          <button className={btnPrimary} onClick={save}><Save size={15} /> Save</button>
        </div>
      )}
    </Modal>
  );
}

/* ----------------------------- All Products ------------------------ */
function AllProducts({ data, role, setData }) {
  const [q, setQ] = useState("");
  const [fCat, setFCat] = useState("");
  const [fSub, setFSub] = useState("");
  const [fAttr, setFAttr] = useState("");
  const [fVal, setFVal] = useState("");
  const [editor, setEditor] = useState(null);
  const [del, setDel] = useState(null);

  const cat = data.categories.find((c) => c.id === fCat);
  const attr = data.attributes.find((a) => a.id === fAttr);

  const rows = useMemo(() => data.products.filter((p) => {
    if (q && !(`${p.name} ${p.sku}`.toLowerCase().includes(q.toLowerCase()))) return false;
    if (fCat && p.categoryId !== fCat) return false;
    if (fSub && p.subId !== fSub) return false;
    if (fAttr && fVal) {
      const v = p.values?.[fAttr];
      const has = Array.isArray(v) ? v.includes(fVal) : v === fVal;
      if (!has) return false;
    }
    return true;
  }), [data, q, fCat, fSub, fAttr, fVal]);

  const nameOf = (id, list) => list.find((x) => x.id === id)?.name || "—";
  const subName = (p) => data.categories.find((c) => c.id === p.categoryId)?.subs.find((s) => s.id === p.subId)?.name || "—";
  const assignedCount = (p) => data.attributes.reduce((n, a) => {
    const v = p.values?.[a.id];
    return n + ((Array.isArray(v) ? v.length : v) ? 1 : 0);
  }, 0);

  const saveProduct = (prod) => {
    setData((d) => {
      const exists = d.products.some((x) => x.id === prod.id);
      return { ...d, products: exists ? d.products.map((x) => x.id === prod.id ? prod : x) : [prod, ...d.products] };
    });
    setEditor(null);
  };
  const doDelete = () => { setData((d) => ({ ...d, products: d.products.filter((x) => x.id !== del.id) })); setDel(null); };
  const clear = () => { setQ(""); setFCat(""); setFSub(""); setFAttr(""); setFVal(""); };

  return (
    <div>
      <div className="mb-4 rounded-lg border border-slate-200 bg-white p-3">
        <div className="flex flex-wrap items-center gap-2">
          <div className="relative flex-1 min-w-[200px]">
            <Search size={15} className="absolute left-2.5 top-2.5 text-slate-400" />
            <input className={`${input} pl-8`} placeholder="Search name or SKU…" value={q} onChange={(e) => setQ(e.target.value)} />
          </div>
          <select className={`${input} w-auto`} value={fCat} onChange={(e) => { setFCat(e.target.value); setFSub(""); }}>
            <option value="">All categories</option>
            {data.categories.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
          <select className={`${input} w-auto`} value={fSub} onChange={(e) => setFSub(e.target.value)} disabled={!cat}>
            <option value="">{cat ? "All sub-categories" : "Sub-category"}</option>
            {cat?.subs.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
          <select className={`${input} w-auto`} value={fAttr} onChange={(e) => { setFAttr(e.target.value); setFVal(""); }}>
            <option value="">Filter by attribute</option>
            {data.attributes.map((a) => <option key={a.id} value={a.id}>{a.name}</option>)}
          </select>
          <select className={`${input} w-auto`} value={fVal} onChange={(e) => setFVal(e.target.value)} disabled={!attr}>
            <option value="">{attr ? "Any value" : "Value"}</option>
            {attr?.options.map((o) => <option key={o} value={o}>{o}</option>)}
          </select>
          {(q || fCat || fSub || fAttr) && <button className={btnGhost} onClick={clear}><X size={14} /> Clear</button>}
        </div>
      </div>

      <div className="overflow-hidden rounded-lg border border-slate-200 bg-white">
        <table className="w-full text-sm">
          <thead>
            <tr className="border-b border-slate-200 bg-slate-50 text-left text-xs uppercase tracking-wide text-slate-500">
              <th className="px-4 py-2.5 font-medium">Product</th>
              <th className="px-4 py-2.5 font-medium">Category</th>
              <th className="px-4 py-2.5 font-medium">Sub-category</th>
              <th className="px-4 py-2.5 font-medium">Attributes</th>
              <th className="px-4 py-2.5 text-right font-medium">Actions</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((p) => (
              <tr key={p.id} className="border-b border-slate-100 last:border-0 hover:bg-slate-50/60">
                <td className="px-4 py-2.5">
                  <div className="font-medium text-slate-800">{p.name}</div>
                  <div className="text-xs text-slate-400">{p.sku || "no SKU"}</div>
                </td>
                <td className="px-4 py-2.5 text-slate-600">{nameOf(p.categoryId, data.categories)}</td>
                <td className="px-4 py-2.5 text-slate-600">{subName(p)}</td>
                <td className="px-4 py-2.5">
                  <Badge tone={assignedCount(p) ? "green" : "slate"}>{assignedCount(p)}/{data.attributes.length} set</Badge>
                </td>
                <td className="px-4 py-2.5">
                  <div className="flex justify-end gap-1">
                    <button className={btnGhost} title="View" onClick={() => setEditor({ mode: "view", product: p })}><Eye size={15} /></button>
                    {can(role, "edit") && <button className={btnGhost} title="Edit & assign" onClick={() => setEditor({ mode: "edit", product: p })}><Pencil size={15} /></button>}
                    {can(role, "delete") && <button className={btnDanger} title="Delete" onClick={() => setDel(p)}><Trash2 size={15} /></button>}
                  </div>
                </td>
              </tr>
            ))}
            {!rows.length && (
              <tr><td colSpan={5} className="px-4 py-10 text-center text-sm text-slate-400">No products match. Adjust filters or add a product.</td></tr>
            )}
          </tbody>
        </table>
      </div>

      {editor && <ProductEditor {...editor} data={data} onClose={() => setEditor(null)} onSave={saveProduct} />}
      {del && <Confirm text={`Delete "${del.name}"? This can't be undone.`} onCancel={() => setDel(null)} onConfirm={doDelete} />}
    </div>
  );
}

/* ----------------------------- Categories -------------------------- */
function Categories({ data, setData, goBulk }) {
  const [newCat, setNewCat] = useState("");
  const [editCat, setEditCat] = useState(null);
  const [subInput, setSubInput] = useState({});
  const [del, setDel] = useState(null);

  const addCat = () => {
    if (!newCat.trim()) return;
    setData((d) => ({ ...d, categories: [...d.categories, { id: uid("cat"), name: newCat.trim(), subs: [] }] }));
    setNewCat("");
  };
  const renameCat = () => {
    setData((d) => ({ ...d, categories: d.categories.map((c) => c.id === editCat.id ? { ...c, name: editCat.name } : c) }));
    setEditCat(null);
  };
  const addSub = (catId) => {
    const v = (subInput[catId] || "").trim();
    if (!v) return;
    setData((d) => ({ ...d, categories: d.categories.map((c) => c.id === catId ? { ...c, subs: [...c.subs, { id: uid("sub"), name: v }] } : c) }));
    setSubInput((s) => ({ ...s, [catId]: "" }));
  };
  const delSub = (catId, subId) =>
    setData((d) => ({ ...d, categories: d.categories.map((c) => c.id === catId ? { ...c, subs: c.subs.filter((s) => s.id !== subId) } : c) }));
  const doDelCat = () => { setData((d) => ({ ...d, categories: d.categories.filter((c) => c.id !== del.id) })); setDel(null); };
  const productCount = (catId) => data.products.filter((p) => p.categoryId === catId).length;

  return (
    <div>
      <div className="mb-4 flex gap-2">
        <input className={input} placeholder="New category name…" value={newCat}
          onChange={(e) => setNewCat(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addCat()} />
        <button className={btnPrimary} onClick={addCat}><Plus size={15} /> Add category</button>
      </div>

      <div className="space-y-3">
        {data.categories.map((c) => (
          <div key={c.id} className="rounded-lg border border-slate-200 bg-white">
            <div className="flex items-center justify-between border-b border-slate-100 px-4 py-2.5">
              <div className="flex items-center gap-2">
                <FolderTree size={16} className="text-indigo-600" />
                <span className="font-medium text-slate-800">{c.name}</span>
                <Badge tone="slate">{c.subs.length} subs</Badge>
                <Badge tone="indigo">{productCount(c.id)} products</Badge>
              </div>
              <div className="flex gap-1">
                <button className={btnGhost} onClick={() => goBulk(c.id)} title="Bulk add to this category"><PackagePlus size={15} /> Bulk add</button>
                <button className={btnGhost} onClick={() => setEditCat({ id: c.id, name: c.name })}><Pencil size={15} /></button>
                <button className={btnDanger} onClick={() => setDel(c)}><Trash2 size={15} /></button>
              </div>
            </div>
            <div className="px-4 py-3">
              <div className="mb-2 flex flex-wrap gap-1.5">
                {c.subs.map((s) => (
                  <span key={s.id} className="inline-flex items-center gap-1 rounded-full bg-slate-100 px-2.5 py-1 text-xs text-slate-700">
                    {s.name}
                    <button onClick={() => delSub(c.id, s.id)} className="text-slate-400 hover:text-rose-600"><X size={12} /></button>
                  </span>
                ))}
                {!c.subs.length && <span className="text-xs text-slate-400">No sub-categories yet.</span>}
              </div>
              <div className="flex gap-2">
                <input className={`${input} max-w-xs`} placeholder="Add sub-category…" value={subInput[c.id] || ""}
                  onChange={(e) => setSubInput((s) => ({ ...s, [c.id]: e.target.value }))}
                  onKeyDown={(e) => e.key === "Enter" && addSub(c.id)} />
                <button className={btnGhost} onClick={() => addSub(c.id)}><Plus size={14} /> Add sub</button>
              </div>
            </div>
          </div>
        ))}
      </div>

      {editCat && (
        <Modal title="Rename category" onClose={() => setEditCat(null)}>
          <input className={input} value={editCat.name} onChange={(e) => setEditCat({ ...editCat, name: e.target.value })} />
          <div className="mt-4 flex justify-end gap-2">
            <button className={btnGhost} onClick={() => setEditCat(null)}>Cancel</button>
            <button className={btnPrimary} onClick={renameCat}><Save size={15} /> Save</button>
          </div>
        </Modal>
      )}
      {del && <Confirm text={`Delete category "${del.name}" and its sub-categories? Products keep their data but lose this category link.`} onCancel={() => setDel(null)} onConfirm={doDelCat} />}
    </div>
  );
}

/* ----------------------------- Attributes -------------------------- */
function Attributes({ data, setData }) {
  const [form, setForm] = useState(null);
  const [del, setDel] = useState(null);
  const blank = { name: "", type: "single", options: [""] };

  const save = () => {
    const opts = form.options.map((o) => o.trim()).filter(Boolean);
    if (!form.name.trim()) return alert("Attribute name required.");
    if (!opts.length) return alert("Add at least one option.");
    const rec = { id: form.id || uid("at"), name: form.name.trim(), type: form.type, options: opts };
    setData((d) => ({ ...d, attributes: form.id ? d.attributes.map((a) => a.id === form.id ? rec : a) : [...d.attributes, rec] }));
    setForm(null);
  };
  const doDel = () => { setData((d) => ({ ...d, attributes: d.attributes.filter((a) => a.id !== del.id) })); setDel(null); };

  return (
    <div>
      <div className="mb-4 flex justify-end">
        <button className={btnPrimary} onClick={() => setForm({ ...blank })}><Plus size={15} /> Add attribute</button>
      </div>

      <div className="grid gap-3 sm:grid-cols-2">
        {data.attributes.map((a) => (
          <div key={a.id} className="rounded-lg border border-slate-200 bg-white p-4">
            <div className="mb-2 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <span className="font-medium text-slate-800">{a.name}</span>
                <Badge tone={a.type === "single" ? "indigo" : "amber"}>{a.type === "single" ? "single-select" : "multi-select"}</Badge>
              </div>
              <div className="flex gap-1">
                <button className={btnGhost} onClick={() => setForm({ ...a, options: [...a.options] })}><Pencil size={14} /></button>
                <button className={btnDanger} onClick={() => setDel(a)}><Trash2 size={14} /></button>
              </div>
            </div>
            <div className="flex flex-wrap gap-1.5">
              {a.options.map((o) => <span key={o} className="rounded bg-slate-100 px-2 py-0.5 text-xs text-slate-600">{o}</span>)}
            </div>
          </div>
        ))}
        {!data.attributes.length && <p className="text-sm text-slate-400">No attributes yet.</p>}
      </div>

      {form && (
        <Modal title={form.id ? "Edit attribute" : "Add attribute"} onClose={() => setForm(null)}>
          <label className="mb-1 block text-xs font-medium text-slate-500">Name</label>
          <input className={input} value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="e.g. Finish" />

          <label className="mb-1 mt-3 block text-xs font-medium text-slate-500">Type</label>
          <div className="flex gap-2">
            {["single", "multiple"].map((t) => (
              <button key={t} onClick={() => setForm({ ...form, type: t })}
                className={`flex-1 rounded-md border px-3 py-2 text-sm ${form.type === t ? "border-indigo-600 bg-indigo-50 text-indigo-700" : "border-slate-300 text-slate-600"}`}>
                {t === "single" ? "Single value" : "Multiple values"}
              </button>
            ))}
          </div>

          <label className="mb-1 mt-3 block text-xs font-medium text-slate-500">Options</label>
          <div className="space-y-2">
            {form.options.map((o, i) => (
              <div key={i} className="flex gap-2">
                <input className={input} value={o}
                  onChange={(e) => setForm({ ...form, options: form.options.map((x, j) => j === i ? e.target.value : x) })}
                  placeholder={`Option ${i + 1}`} />
                <button className={btnGhost} onClick={() => setForm({ ...form, options: form.options.filter((_, j) => j !== i) })}><X size={14} /></button>
              </div>
            ))}
            <button className={btnGhost} onClick={() => setForm({ ...form, options: [...form.options, ""] })}><Plus size={14} /> Add option</button>
          </div>

          <div className="mt-5 flex justify-end gap-2">
            <button className={btnGhost} onClick={() => setForm(null)}>Cancel</button>
            <button className={btnPrimary} onClick={save}><Save size={15} /> Save</button>
          </div>
        </Modal>
      )}
      {del && <Confirm text={`Delete attribute "${del.name}"? Assigned values on products will be cleared.`} onCancel={() => setDel(null)} onConfirm={doDel} />}
    </div>
  );
}

/* ------------------------------- Bulk add -------------------------- */
function BulkAdd({ data, setData, presetCat, clearPreset }) {
  const [categoryId, setCategoryId] = useState(presetCat || "");
  const [subId, setSubId] = useState("");
  const [text, setText] = useState("");
  const [done, setDone] = useState(0);

  useEffect(() => { if (presetCat) setCategoryId(presetCat); }, [presetCat]);

  const cat = data.categories.find((c) => c.id === categoryId);
  const lines = text.split("\n").map((l) => l.trim()).filter(Boolean);

  const add = () => {
    if (!categoryId) return alert("Pick a category for these products.");
    if (!lines.length) return alert("Enter at least one product name (one per line).");
    const newProducts = lines.map((line) => {
      const parts = line.split("|").map((s) => s.trim());
      return { id: uid("p"), name: parts[0], sku: parts[1] || "", categoryId, subId, values: {} };
    });
    setData((d) => ({ ...d, products: [...newProducts, ...d.products] }));
    setDone(newProducts.length);
    setText("");
  };

  return (
    <div className="max-w-2xl">
      {presetCat && (
        <div className="mb-4 flex items-center gap-2 rounded-lg border border-indigo-200 bg-indigo-50 px-3 py-2 text-sm text-indigo-700">
          <Layers size={15} /> Pre-filled for category <strong>{cat?.name}</strong>.
          <button className="ml-auto text-indigo-500 hover:underline" onClick={clearPreset}>change</button>
        </div>
      )}
      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className="mb-1 block text-xs font-medium text-slate-500">Category</label>
          <select className={input} value={categoryId} onChange={(e) => { setCategoryId(e.target.value); setSubId(""); }}>
            <option value="">Select category…</option>
            {data.categories.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>
        <div>
          <label className="mb-1 block text-xs font-medium text-slate-500">Sub-category</label>
          <select className={input} value={subId} onChange={(e) => setSubId(e.target.value)} disabled={!cat}>
            <option value="">{cat ? "None / optional" : "—"}</option>
            {cat?.subs.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        </div>
      </div>

      <label className="mb-1 mt-3 block text-xs font-medium text-slate-500">Products — one per line. Optional SKU after a “|”.</label>
      <textarea className={`${input} h-44 font-mono text-xs`} value={text} onChange={(e) => { setText(e.target.value); setDone(0); }}
        placeholder={"Custom Kraft Pouch | MYL-KR-002\nMatte Soap Box\nClear Sticker Sheet | LBL-CS-009"} />

      <div className="mt-3 flex items-center gap-3">
        <button className={btnPrimary} onClick={add}><Upload size={15} /> Add {lines.length || ""} products</button>
        {done > 0 && <span className="flex items-center gap-1 text-sm text-emerald-600"><Check size={15} /> Added {done}. Assign attributes from All Products.</span>}
      </div>
    </div>
  );
}

/* ------------------------------ Login ------------------------------ */
function LoginGate({ onAuth }) {
  const [code, setCode] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  const notConfigured = API.includes("PASTE_YOUR_WEB_APP_URL");

  const submit = async () => {
    if (!code) return;
    setBusy(true); setErr("");
    try {
      const r = await api("auth", { passcode: code });
      if (r.ok) onAuth(r.role); else setErr(r.error || "Wrong passcode");
    } catch (e) { setErr("Can't reach the server. Check the API URL in the file."); }
    setBusy(false);
  };

  return (
    <div className="flex min-h-screen items-center justify-center bg-slate-50 px-4">
      <div className="w-full max-w-sm rounded-2xl border border-slate-200 bg-white p-7 shadow-sm">
        <div className="mb-5 flex items-center gap-2.5">
          <div className="flex h-9 w-9 items-center justify-center rounded-lg bg-indigo-600 text-white"><ListChecks size={18} /></div>
          <div>
            <div className="text-sm font-bold tracking-tight text-slate-800">AttrAssign</div>
            <div className="text-[10px] uppercase tracking-wide text-slate-400">Attribute Manager</div>
          </div>
        </div>

        {notConfigured ? (
          <div className="rounded-lg border border-amber-200 bg-amber-50 p-3 text-xs text-amber-700">
            <div className="mb-1 flex items-center gap-1.5 font-semibold"><AlertTriangle size={13} /> Not connected yet</div>
            Paste your Apps Script Web app URL into the <code className="rounded bg-amber-100 px-1">API</code> constant near the top of this file, then reload.
          </div>
        ) : (
          <div>
            <label className="mb-1 block text-xs font-medium text-slate-500">Passcode</label>
            <div className="relative">
              <Lock size={15} className="absolute left-2.5 top-2.5 text-slate-400" />
              <input type="password" className={`${input} pl-8`} value={code} autoFocus
                onChange={(e) => setCode(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit()}
                placeholder="Enter admin or sales code" />
            </div>
            {err && <p className="mt-2 text-xs text-rose-600">{err}</p>}
            <button className={`${btnPrimary} mt-4 w-full justify-center`} onClick={submit} disabled={busy}>
              {busy ? "Checking…" : "Sign in"}
            </button>
            <p className="mt-3 text-center text-[11px] text-slate-400">Your role is set by the passcode you enter.</p>
          </div>
        )}
      </div>
    </div>
  );
}

/* --------------------------------- App ----------------------------- */
const NAV = [
  { id: "products", label: "All Products", icon: Boxes, perm: "view" },
  { id: "categories", label: "Categories", icon: FolderTree, perm: "manageCategories" },
  { id: "attributes", label: "Attributes", icon: Tags, perm: "manageAttributes" },
  { id: "bulk", label: "Bulk Add", icon: PackagePlus, perm: "bulkAdd" },
];

function App() {
  const [role, setRole] = useState(null);
  const [data, setData] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("products");
  const [bulkPreset, setBulkPreset] = useState("");
  const [addOpen, setAddOpen] = useState(false);
  const [status, setStatus] = useState("synced");
  const saveTimer = useRef(null);

  // load data once signed in
  useEffect(() => {
    if (!role) return;
    setLoaded(false);
    loadData().then((d) => { setData(d); setLoaded(true); });
  }, [role]);

  // debounced auto-save to the Sheet
  useEffect(() => {
    if (!loaded || !data) return;
    setStatus("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try { await api("save", { data }); setStatus("saved"); }
      catch (e) { setStatus("error"); }
    }, 700);
  }, [data]);

  useEffect(() => {
    const item = NAV.find((n) => n.id === tab);
    if (item && !can(role, item.perm)) setTab("products");
  }, [role, tab]);

  if (!role) return <LoginGate onAuth={setRole} />;
  if (!loaded || !data) {
    return <div className="flex h-screen items-center justify-center bg-slate-50 text-sm text-slate-400">Loading your data…</div>;
  }

  const goBulk = (catId) => { setBulkPreset(catId); setTab("bulk"); };
  const signOut = () => { setRole(null); setData(null); setLoaded(false); setTab("products"); };
  const visibleNav = NAV.filter((n) => can(role, n.perm));
  const current = NAV.find((n) => n.id === tab);
  const saveNew = (prod) => { setData((d) => ({ ...d, products: [prod, ...d.products] })); setAddOpen(false); };
  const statusText = status === "saving" ? "Syncing…" : status === "saved" ? "All changes saved" : status === "error" ? "Sync error — retrying" : "Synced";

  return (
    <div className="flex h-screen bg-slate-50 text-slate-900" style={{ fontFamily: "ui-sans-serif, system-ui, -apple-system, sans-serif" }}>
      <aside className="flex w-60 shrink-0 flex-col border-r border-slate-200 bg-white">
        <div className="flex items-center gap-2 px-5 py-4">
          <div className="flex h-8 w-8 items-center justify-center rounded-lg bg-indigo-600 text-white"><ListChecks size={17} /></div>
          <div>
            <div className="text-sm font-bold tracking-tight text-slate-800">AttrAssign</div>
            <div className="text-[10px] uppercase tracking-wide text-slate-400">Attribute Manager</div>
          </div>
        </div>
        <nav className="flex-1 space-y-0.5 px-3 py-2">
          {visibleNav.map((n) => {
            const Ic = n.icon;
            return (
              <button key={n.id} onClick={() => setTab(n.id)}
                className={`flex w-full items-center gap-2.5 rounded-md px-3 py-2 text-sm font-medium transition-colors ${
                  tab === n.id ? "bg-indigo-50 text-indigo-700" : "text-slate-600 hover:bg-slate-100"
                }`}>
                <Ic size={16} /> {n.label}
              </button>
            );
          })}
        </nav>
        <div className="border-t border-slate-200 p-3">
          <div className="flex items-center gap-2 rounded-lg bg-slate-50 px-3 py-2">
            {role === "admin" ? <Shield size={16} className="text-indigo-600" /> : <Briefcase size={16} className="text-indigo-600" />}
            <div className="flex-1 leading-tight">
              <div className="text-xs font-semibold text-slate-700">{role === "admin" ? "Admin" : "Sales"}</div>
              <div className={`text-[10px] ${status === "error" ? "text-rose-500" : "text-slate-400"}`}>{statusText}</div>
            </div>
            <button onClick={signOut} className="text-[11px] font-medium text-slate-500 hover:text-indigo-600">Sign out</button>
          </div>
        </div>
      </aside>

      <main className="flex-1 overflow-y-auto">
        <header className="sticky top-0 z-10 flex items-center justify-between border-b border-slate-200 bg-white/80 px-6 py-3 backdrop-blur">
          <div>
            <h1 className="text-base font-semibold text-slate-800">{current?.label}</h1>
            <p className="text-xs text-slate-400">
              {data.products.length} products · {data.categories.length} categories · {data.attributes.length} attributes
            </p>
          </div>
          {tab === "products" && can(role, "addProduct") && (
            <button className={btnPrimary} onClick={() => setAddOpen(true)}><Plus size={15} /> Add product</button>
          )}
        </header>

        <div className="p-6">
          {tab === "products" && <AllProducts data={data} role={role} setData={setData} />}
          {tab === "categories" && can(role, "manageCategories") && <Categories data={data} setData={setData} goBulk={goBulk} />}
          {tab === "attributes" && can(role, "manageAttributes") && <Attributes data={data} setData={setData} />}
          {tab === "bulk" && can(role, "bulkAdd") && <BulkAdd data={data} setData={setData} presetCat={bulkPreset} clearPreset={() => setBulkPreset("")} />}
        </div>
      </main>

      {addOpen && <ProductEditor mode="add" product={null} data={data} onClose={() => setAddOpen(false)} onSave={saveNew} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
